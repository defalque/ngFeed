<div
  appClickOutside
  [clickOutsideEnabled]="isOptionsOpen()"
  (onClickOutside)="this.closeOptions.emit()"
  class="relative inline-block col-span-1"
>
  <button
    #button
    class="text-zinc-400/80 rounded-full p-2 active:scale-[0.92] cursor-pointer col-span-1 focus relative z-10 group transition-[transform,background-color] duration-150 ease-out motion-reduce:transition-none"
    [class.active]="isOptionsOpen()"
    aria-label="Opzioni post"
    (click)="toggleOptionsOpen($event)"
  >
    <div
      class="navlink-hover-bg bg-gray-200/75 dark:bg-zinc-800/70 w-full h-full rounded-full scale-[0.85] absolute p-2.5 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 -z-10 pointer-events-none group-hover:scale-100 duration-150 opacity-0 group-hover:opacity-100 ease-out transition-transform motion-reduce:transition-none"
    ></div>
    <lucide-icon [img]="EllipsisIcon" size="18" aria-hidden></lucide-icon>
  </button>

  @defer (on hover(button); on interaction(button)) {
    <app-dropdown-menu
      [isOpen]="isOptionsOpen()"
      usedIn="post-options"
      [isCurrentUserPost]="isCurrentUserPost()"
    >
      @if (!isCurrentUserPost()) {
        <button
          role="menuitem"
          (click)="onSavePostClick($event)"
          class="w-full flex items-center justify-between px-4 py-2 hover:bg-gray-100/55 dark:hover:bg-zinc-800 rounded-md cursor-pointer focus"
          [attr.tabindex]="isOptionsOpen() ? '0' : '-1'"
        >
          @if (isSavingPost()) {
            <span>{{ isSavedPost() ? 'Rimozione post' : 'Salvataggio post' }}</span>

            <div
              class="size-5 rounded-full border-[3px] border-black dark:border-white border-t-white dark:border-t-zinc-800 border-r-white dark:border-r-zinc-800 animate-spin [animation-duration:500ms]"
            ></div>
          } @else {
            {{ isSavedPost() ? 'Rimuovi' : 'Salva' }}
            <lucide-icon
              [img]="BookmarkIcon"
              size="20"
              class="text-black! dark:text-white!"
              aria-hidden
            ></lucide-icon>
          }
        </button>

        <button
          role="menuitem"
          class="w-full flex items-center justify-between px-4 py-2 hover:bg-gray-100/55 dark:hover:bg-zinc-800 rounded-md cursor-pointer focus"
          [attr.tabindex]="isOptionsOpen() ? '0' : '-1'"
        >
          <span>Non mi interessa</span>
          <lucide-icon
            [img]="ThumbsDownIcon"
            size="20"
            class="text-black! dark:text-white!"
            aria-hidden
          ></lucide-icon>
        </button>
        <button
          role="menuitem"
          class="text-red-500 w-full flex items-center justify-between px-4 py-2 hover:bg-gray-100/55 dark:hover:bg-zinc-800 rounded-md cursor-pointer focus"
          [attr.tabindex]="isOptionsOpen() ? '0' : '-1'"
        >
          <span>Segnala</span>
          <lucide-icon
            [img]="MessageSquareWarningIcon"
            size="20"
            class="text-red-500!"
            aria-hidden
          ></lucide-icon>
        </button>
      } @else {
        <button
          role="menuitem"
          (click)="openEditPostDialog($event)"
          class="w-full flex items-center justify-between px-4 py-2 hover:bg-gray-100/55 dark:hover:bg-zinc-800 rounded-md cursor-pointer focus"
          [attr.tabindex]="isOptionsOpen() ? '0' : '-1'"
        >
          <span>Modifica</span>
          <lucide-icon
            [img]="PencilIcon"
            size="20"
            class="text-black! dark:text-white!"
            aria-hidden
          ></lucide-icon>
        </button>
        <button
          role="menuitem"
          (click)="openDeletePostDialog($event)"
          class="w-full flex items-center justify-between text-red-500 px-4 py-2 hover:bg-gray-100/55 dark:hover:bg-zinc-800 rounded-md cursor-pointer focus"
          [attr.tabindex]="isOptionsOpen() ? '0' : '-1'"
        >
          <span>Elimina</span>
          <lucide-icon [img]="TrashIcon" size="20" class="text-red-500!" aria-hidden></lucide-icon>
        </button>
      }
    </app-dropdown-menu>
  }
</div>
