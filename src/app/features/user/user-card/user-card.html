<li
  class="grid grid-cols-[2.8rem_1fr_auto] gap-x-2 px-2 md:px-4 py-4 border-b last:border-b-0 border-gray-200"
>
  <img
    [src]="user().avatar || '/assets/images/default-user.avif'"
    [alt]="'Avatar di ' + user().firstName + ' ' + user().lastName"
    class="rounded-full w-full h-full"
  />
  <div class="flex items-center gap-2 col-span-1">
    <div class="flex flex-col items-start">
      <div class="flex items-center gap-2">
        <a [routerLink]="['/utente/', user().id]" class="text-base font-bold hover:underline">{{
          user().firstName + ' ' + user().lastName
        }}</a>
        @if (user().isVerified) {
          <app-verified-icon size="size-4" />
        }
      </div>
      <p class="text-sm text-gray-500">@{{ user().username }}</p>
    </div>
  </div>
  <button
    (click)="onFollowClick()"
    class="bg-black hover:bg-black/80 cursor-pointer transition-transform duration-300 text-white px-6 py-2 text-base rounded-md font-bold text-shadow-2xs focus-button active:scale-[0.95]"
  >
    Segui
  </button>

  <p class="text-sm text-black/80 col-span-full col-start-2 pt-4 text-start">
    {{ user().bio }}
  </p>
  <span class="text-sm text-black/80 col-span-1 col-start-2 pt-2 text-start"
    >Follower: {{ user().followersCount }}</span
  >
</li>
