<div class="flex flex-col px-5 sm:px-6 pb-4 gap-y-3">
  <h2 class="text-base sm:text-lg font-medium mt-2 text-center sm:text-left">
    Sei sicuro di voler eliminare questo post "{{ postTitle() }}"?
  </h2>
  <p class="text-sm sm:text-base text-center sm:text-left text-black/70">
    Questa è una operazione irreversibile. Dopo la conferma non sarà possibile effettuare il
    ripristino.
  </p>
  <div
    class="flex items-center sm:justify-end flex-col-reverse justify-center sm:flex-row gap-4 mt-4"
  >
    <button
      type="button"
      (click)="onCloseModal()"
      class="bg-gray-100 hover:bg-gray-200 disabled:hover:bg-gray-100 w-full sm:w-auto text-black/70 cursor-pointer duration-300 px-4 py-2 text-base sm:text-lg rounded-md font-semibold focus-button transition-colors disabled:cursor-not-allowed"
      [disabled]="isDeleting()"
    >
      Annulla
    </button>
    <button
      type="button"
      (click)="onDeletePost()"
      class="bg-red-500 hover:bg-red-600 disabled:hover:bg-red-500 w-full sm:w-auto cursor-pointer transition-colors duration-300 text-white px-4 py-2 text-base sm:text-lg rounded-md font-semibold text-shadow-xs focus-button disabled:cursor-not-allowed flex items-center gap-4 justify-center"
      [disabled]="isDeleting()"
    >
      @if (isDeleting()) {
        <span>Eliminazione</span>
        <div
          class="size-5 rounded-full border-[3px] border-red-500 border-t-[3px] border-t-white border-r-[3px] border-r-white border-b-[3px] border-b-white animate-spin [animation-duration:500ms]"
        ></div>
      } @else {
        <span>Conferma</span>
      }
    </button>
  </div>
</div>
