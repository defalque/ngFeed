<div
  class="hidden md:block max-w-2xl mx-auto text-center w-full py-4 md:sticky md:top-0 md:z-1000 bg-white dark:bg-zinc-950"
>
  <h1 class="text-xl font-semibold tracking-normal">Preferiti</h1>
</div>
<h1 class="sr-only md:hidden">Preferiti</h1>

<div class="max-w-2xl mx-auto sticky top-15 z-900 hidden md:block">
  <div class="absolute top-0 left-0 z-2 w-7 h-9 overflow-hidden">
    <div
      class="w-12 h-12 rounded-t-3xl border-t border-l border-gray-300/50 dark:border-zinc-800/90 shadow-[0_0_0_9999px_white] dark:shadow-[0_0_0_9999px_#09090b]"
    ></div>
  </div>

  <div
    class="absolute top-0 left-0 right-0 z-1 max-w-[93%] mx-auto h-2 bg-transparent border-t border-gray-300/50 dark:border-zinc-800/90 _rounded-t-3xl"
  ></div>

  <div class="absolute top-0 right-0 z-2 w-7 h-9 overflow-hidden">
    <div
      class="-ml-5 w-12 h-12 rounded-t-3xl border-t border-r border-gray-300/50 dark:border-zinc-800/90 shadow-[0_0_0_9999px_white] dark:shadow-[0_0_0_9999px_#09090b]"
    ></div>
  </div>
</div>

<div class="max-w-2xl flex flex-col gap-4 mx-auto w-full pb-30 md:pb-4 min-h-[calc(100vh-7rem)]">
  @if (posts().length === 0) {
    <div
      class="rounded-b-3xl border-x-0 border-b-0 md:border-x md:border-b border-gray-300/70 dark:border-zinc-800/90 bg-white dark:bg-zinc-950 md:bg-gray-100/50 md:dark:bg-zinc-900/60"
    >
      <div appEmptyWrapper>
        <svg
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          stroke="#000000"
          class="size-24"
          aria-hidden="true"
        >
          <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
          <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
          <g id="SVGRepo_iconCarrier">
            <path
              fill-rule="evenodd"
              clip-rule="evenodd"
              d="M11.9973 8.53055C11.1975 7.62155 9.8639 7.37703 8.86188 8.2094C7.85986 9.04177 7.71879 10.4334 8.50568 11.4179C8.97361 12.0033 10.1197 13.053 10.9719 13.8079C11.3237 14.1195 11.4996 14.2753 11.7114 14.3385C11.8925 14.3925 12.102 14.3925 12.2832 14.3385C12.4949 14.2753 12.6708 14.1195 13.0226 13.8079C13.8748 13.053 15.0209 12.0033 15.4888 11.4179C16.2757 10.4334 16.1519 9.03301 15.1326 8.2094C14.1134 7.38579 12.797 7.62155 11.9973 8.53055Z"
              stroke="#9f9fa9"
              stroke-width="2"
              stroke-linejoin="round"
            ></path>
            <path
              d="M3 7.2C3 6.07989 3 5.51984 3.21799 5.09202C3.40973 4.71569 3.71569 4.40973 4.09202 4.21799C4.51984 4 5.0799 4 6.2 4H17.8C18.9201 4 19.4802 4 19.908 4.21799C20.2843 4.40973 20.5903 4.71569 20.782 5.09202C21 5.51984 21 6.0799 21 7.2V20L17.6757 18.3378C17.4237 18.2118 17.2977 18.1488 17.1656 18.1044C17.0484 18.065 16.9277 18.0365 16.8052 18.0193C16.6672 18 16.5263 18 16.2446 18H6.2C5.07989 18 4.51984 18 4.09202 17.782C3.71569 17.5903 3.40973 17.2843 3.21799 16.908C3 16.4802 3 15.9201 3 14.8V7.2Z"
              stroke="#9f9fa9"
              stroke-width="2"
              stroke-linejoin="round"
            ></path>
          </g>
        </svg>
        <p class="text-xl text-center font-semibold text-zinc-400">Non hai preferiti al momento</p>
      </div>
    </div>
  } @else {
    <ul
      class="py-1 divide-y divide-gray-300/70 dark:divide-zinc-800/90 rounded-b-3xl border-x-0 border-b-0 md:border-x md:border-b border-gray-300/70 dark:border-zinc-800/90 bg-white dark:bg-zinc-950 md:bg-gray-100/50 md:dark:bg-zinc-900/60"
    >
      @for (post of posts(); track post.id; let index = $index) {
        <li>
          <app-post
            [index]="index"
            [isLikedPost]="likedSet().has(post.id)"
            [post]="post"
            [type]="'for-you'"
            [currentUserPost]="false"
            [isSavedPost]="true"
          />
        </li>
      }
    </ul>
  }
</div>
