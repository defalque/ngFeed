<div
  role="tablist"
  class="max-w-3xl mx-auto bg-white dark:bg-zinc-950 flex items-center justify-center gap-6 w-full pt-3 md:sticky md:top-0 md:z-10"
>
  <a
    id="tab-per-te"
    role="tab"
    routerLink="/per-te"
    routerLinkActive="active"
    ariaCurrentWhenActive="page"
    class="text-xl font-bold py-2 px-4 tracking-normal text-gray-400/80 cursor-pointer focus"
    >Per te</a
  >
  @if (authUser() && currentUser()) {
    <a
      id="tab-seguiti"
      role="tab"
      routerLink="/seguiti"
      routerLinkActive="active"
      ariaCurrentWhenActive="page"
      class="text-xl font-bold text-zinc-400/80 py-2 px-4 tracking-normal cursor-pointer focus"
      >Seguiti</a
    >
  }
</div>

<div
  role="tabpanel"
  [attr.aria-labelledby]="activeTabId"
  id="home-tabpanel"
  class="contents"
>
  @if (authUser() && currentUser()) {
    <div
    class="max-w-3xl mx-auto bg-white dark:bg-zinc-950 flex flex-col divide-y divide-gray-200 w-full px-0 md:px-2 pt-4 overflow-hidden"
  >
    <div
      class="flex items-center gap-3 border-b border-gray-300/50 dark:border-zinc-800/50 px-1 py-4 sm:p-4"
    >
      <div
        class="flex items-center gap-2 flex-1 focus"
        role="button"
        tabindex="0"
        (click)="openDialog('create', null)"
        (keydown.enter)="openDialog('create', null)"
        (keydown.space)="openDialog('create', null)"
      >
        <img
          [ngSrc]="currentUser()?.avatar | safeAvatarUrl"
          [alt]="'Avatar di ' + currentUser()?.firstName + ' ' + currentUser()?.lastName"
          width="36"
          height="36"
          class="size-9 rounded-full"
          priority
          (error)="$any($event.target).src = '/assets/images/default-user.avif'"
        />
        <p class="text-sm sm:text-base font-medium text-zinc-400/80">
          Cosa c'è di nuovo {{ currentUser()?.firstName }}?
        </p>
      </div>

      <app-button type="button" size="lg" (click)="openDialog('create', null)">Pubblica</app-button>
    </div>
  </div>
  }

  <router-outlet />
</div>
