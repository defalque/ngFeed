<div
  class="max-w-3xl mx-auto bg-white dark:bg-zinc-950 flex flex-col divide-y divide-gray-200 dark:divide-zinc-800/50 w-full px-0 md:px-2 pb-20 md:pb-4"
>
  @if (!posts().length) {
    <div class="flex flex-col justify-cemter items-center mt-12">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="size-20" aria-hidden="true">
        <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
        <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
        <g id="SVGRepo_iconCarrier">
          <path
            d="M20 18L17 18M17 18L14 18M17 18V15M17 18V21M11 21H4C4 17.134 7.13401 14 11 14C11.695 14 12.3663 14.1013 13 14.2899M15 7C15 9.20914 13.2091 11 11 11C8.79086 11 7 9.20914 7 7C7 4.79086 8.79086 3 11 3C13.2091 3 15 4.79086 15 7Z"
            stroke="#9f9fa9"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></path>
        </g>
      </svg>
      <p class="text-xl text-center font-semibold text-zinc-400">
        Comincia a seguire nuovi account
      </p>
    </div>
  } @else {
    <ul class="divide-y divide-gray-200 dark:divide-zinc-800/50">
      @for (post of posts(); track post.id; let index = $index) {
        <li>
          <app-post
            [index]="index"
            type="for-you"
            [post]="post"
            [currentUserPost]="false"
            [isLikedPost]="likedSet().has(post.id)"
            [isSavedPost]="savedSet().has(post.id)"
          />
        </li>
      }
    </ul>
  }
</div>
