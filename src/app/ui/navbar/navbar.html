<aside
  class="fixed z-50 w-full md:top-0 left-0 bottom-0 md:w-30 flex flex-col items-center md:h-svh"
>
  <div class="hidden w-full md:block text-center py-4">
    <h1 class="text-3xl font-bold tracking-tighter">ngFeed</h1>
  </div>
  <div class="flex flex-col items-center w-full flex-1 min-h-0 overflow-y-auto bg-white">
    <ul class="flex md:flex-col items-center justify-around md:justify-center gap-6 w-full flex-1">
      <li class="py-1">
        <a
          routerLink="/per-te"
          class="text-zinc-400/80 hover:bg-gray-100/55 rounded-xl md:px-4 md:py-2 px-6 py-3 cursor-pointer block focus"
          [class.active]="isHomeActive()"
          aria-label="Home"
        >
          <lucide-icon [img]="HomeIcon" size="28" aria-hidden></lucide-icon>
        </a>
      </li>
      <li class="py-1">
        <a
          routerLink="/cerca"
          routerLinkActive="active"
          class="text-zinc-400/80 hover:bg-gray-100/55 rounded-xl md:px-4 md:py-2 px-6 py-3 cursor-pointer block focus"
          aria-label="Cerca"
        >
          <lucide-icon [img]="SearchIcon" size="28" aria-hidden></lucide-icon>
        </a>
      </li>
      <li class="py-1">
        <a
          routerLink="/preferiti"
          routerLinkActive="active"
          class="text-zinc-400/80 hover:bg-gray-100/55 rounded-xl md:px-4 md:py-2 px-6 py-3 cursor-pointer block focus"
          aria-label="Preferiti"
        >
          <lucide-icon [img]="HeartIcon" size="28" aria-hidden></lucide-icon>
        </a>
      </li>
      <li class="py-1">
        <a
          routerLink="/profilo"
          routerLinkActive="active"
          class="text-zinc-400/80 hover:bg-gray-100/55 rounded-xl md:px-4 md:py-2 px-6 py-3 cursor-pointer block focus"
          aria-label="Profilo"
        >
          <lucide-icon [img]="UserIcon" size="28" aria-hidden></lucide-icon>
        </a>
      </li>
    </ul>
  </div>
  <div class="md:block hidden w-full mb-4 text-center">
    <div
      appClickOutsideDropdown
      [clickOutsideEnabled]="isOpen()"
      (onClickOutside)="closeMenu()"
      class="relative inline-block"
    >
      <button
        class="hover:bg-gray-100/55 text-zinc-400/80 rounded-xl px-4 py-2 cursor-pointer focus"
        (click)="toggleOpen()"
        aria-label="Menu"
        [class.active]="isOpen()"
      >
        <lucide-icon [img]="EqualIcon" size="30" aria-hidden></lucide-icon>
      </button>
      @if (isOpen()) {
        <div
          class="absolute bottom-full left-0 mb-2 flex flex-col gap-2 w-56 rounded-lg bg-white shadow-lg border border-gray-300/90 p-1 font-semibold"
        >
          <div class="flex items-center justify-center gap-2">
            <button
              class="w-full px-4 py-2 flex items-center justify-center hover:bg-gray-100/55 rounded-md cursor-pointer"
              aria-label="Modalità chiara"
            >
              <lucide-icon [img]="SunIcon" size="20" aria-hidden></lucide-icon>
            </button>
            <button
              class="w-full px-4 py-2 flex items-center justify-center hover:bg-gray-100/55 rounded-md cursor-pointer"
              aria-label="Modalità scura"
            >
              <lucide-icon [img]="MoonIcon" size="20" aria-hidden></lucide-icon>
            </button>
            <button
              class="w-full px-4 py-2 flex items-center justify-center bg-gray-100/55 hover:bg-gray-100/55 rounded-md cursor-pointer"
            >
              Auto
            </button>
          </div>

          <button class="w-full text-left px-4 py-2 hover:bg-gray-100/55 rounded-md cursor-pointer">
            Impostazioni
          </button>

          <button class="w-full text-left px-4 py-2 hover:bg-gray-100/55 rounded-md cursor-pointer">
            Segnala un problema
          </button>

          <button
            class="text-red-500 w-full text-left px-4 py-2 hover:bg-gray-100/55 rounded-md cursor-pointer"
          >
            Esci
          </button>
        </div>
      }
    </div>
  </div>
</aside>
