<div class="h-screen">
  @if (isFetching()) {
    <div
      class="absolute inset-0 z-50 bg-white flex items-center justify-center flex-col gap-2 animate-pulse duration-500"
    >
      <img src="logo.png" alt="ngFeed" />
      <span class="text-5xl font-bold">ngFeed</span>
    </div>
  } @else {
    <div [inert]="isUpdateProfileFormOpen() || isCreateNewPostFormOpen().active">
      <app-header />
      <app-navbar />

      <main
        class="w-full flex flex-1 flex-col items-center pt-16 md:pt-0 pl-2 md:pl-30 pr-2 lg:pr-30"
      >
        <router-outlet />
      </main>
    </div>

    <app-modal
      [title]="isCreateNewPostFormOpen().mode === 'create' ? 'Nuovo post' : 'Modifica post'"
      [isOpen]="isCreateNewPostFormOpen().active"
      (toggleFn)="toggleCreateNewPostForm()"
    >
      <app-new-feed />
    </app-modal>

    <app-modal
      [title]="'Modifica Profilo'"
      [isOpen]="isUpdateProfileFormOpen()"
      (toggleFn)="toggleUpdateProfileForm()"
    >
      <app-update />
    </app-modal>

      <a

        target="_blank"
        rel="noopener noreferrer"
        >Marco De Falco</a
      >. Tutti i diritti riservati.
    </p>
  </footer> -->
  }
</div>
