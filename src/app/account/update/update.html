<!-- TEMPLATE DRIVEN -->
<form
  #form="ngForm"
  (ngSubmit)="onSubmit(form)"
  appFocusField
  class="flex flex-col gap-4 py-6 px-4"
>
  <h2 class="font-semibold text-center">Modifica il tuo profilo</h2>

  <div class="flex justify-baseline items-center gap-4">
    <div class="flex flex-col items-start gap-2 w-full">
      <label for="firstName">Nome</label>
      <input
        type="text"
        id="firstName"
        name="firstName"
        class="w-full rounded-xl p-2 border border-gray-300/80 focus"
        [(ngModel)]="user.firstName"
      />
    </div>
    <div class="flex flex-col items-start gap-2 w-full">
      <label for="lastName">Cognome</label>
      <input
        type="text"
        id="lastName"
        name="lastName"
        class="w-full rounded-xl p-2 border border-gray-300/80 focus"
        [(ngModel)]="user.lastName"
      />
    </div>
  </div>

  <div class="flex flex-col items-start gap-2">
    <label for="username">Username</label>
    <input
      type="text"
      id="username"
      name="username"
      class="w-full rounded-xl p-2 border border-gray-300/80 focus"
      [(ngModel)]="user.username"
    />
  </div>

  <div class="flex flex-col items-start gap-2">
    <label for="bio">Bio</label>
    <textarea
      id="bio"
      name="bio"
      rows="3"
      class="w-full rounded-xl p-2 border border-gray-300/80 focus"
      [(ngModel)]="user.bio"
    ></textarea>
  </div>

  <div class="flex flex-col items-start gap-2">
    <label for="website">Sito web</label>
    <input
      type="url"
      id="website"
      name="website"
      class="w-full rounded-xl p-2 border border-gray-300/80 focus"
      [(ngModel)]="user.websiteUrl"
    />
  </div>

  <div class="flex flex-col items-start gap-2">
    <label for="location">Luogo</label>
    <input
      type="text"
      id="location"
      name="location"
      class="w-full rounded-xl p-2 border border-gray-300/80 focus"
      [(ngModel)]="user.location"
    />
  </div>

  <button
    type="submit"
    class="bg-black hover:bg-black/80 cursor-pointer transition-colors duration-300 text-white px-4 py-2 text-lg rounded-xl font-bold text-shadow-2xs focus-button"
  >
    Aggiorna profilo
  </button>
</form>
