<form (focusin)="onFieldFocus($event)" class="flex flex-col gap-4 pb-20 md:pb-6 px-4 pt-6">
  <div class="flex flex-col items-start gap-2">
    <label for="title" class="text-lg font-bold tracking-tight">Titolo</label>
    <input type="text" id="title" class="w-full rounded-md p-2 border border-gray-300/80 focus" />
  </div>

  <div class="flex flex-col items-start gap-2">
    <label for="description">Descrizione</label>
    <textarea
      id="description"
      rows="3"
      class="w-full rounded-md p-2 border border-gray-300/80 focus"
    ></textarea>
  </div>

  <div class="flex flex-col items-start gap-2">
    <label for="content">Contenuto</label>
    <textarea
      id="content"
      rows="10"
      class="w-full rounded-md p-2 border border-gray-300/80 focus"
    ></textarea>
  </div>

  <div class="flex flex-col items-start gap-2">
    <label for="tags">Tags</label>
    <input type="text" id="tags" class="w-full rounded-md p-2 border border-gray-300/80 focus" />
  </div>

  <div class="flex flex-col items-start gap-2">
    <label for="image">Immagine del feed</label>
    <input type="file" id="image" class="w-full rounded-md p-2 border border-gray-300/80 focus" />
  </div>

  <button
    type="submit"
    class="bg-black hover:bg-black/80 cursor-pointer transition-colors duration-300 text-white px-4 py-2 text-lg rounded-md font-bold text-shadow-2xs focus-button"
  >
    Crea feed
  </button>
</form>
