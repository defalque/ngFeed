<form appFocusField class="flex flex-col gap-4 py-6 px-4">
  <div class="flex flex-col items-start gap-2">
    <label for="title">Titolo</label>
    <input type="text" id="title" class="w-full rounded-xl p-2 border border-gray-300/80 focus" />
  </div>

  <div class="flex flex-col items-start gap-2">
    <label for="description">Descrizione</label>
    <textarea
      id="description"
      rows="2"
      class="w-full rounded-xl p-2 border border-gray-300/80 focus"
    ></textarea>
  </div>

  <div class="flex flex-col items-start gap-2">
    <label for="content">Contenuto</label>
    <textarea
      id="content"
      rows="4"
      class="w-full rounded-xl p-2 border border-gray-300/80 focus"
    ></textarea>
  </div>

  <div class="flex flex-col items-start gap-2">
    <label for="image">Immagine del post</label>
    <input type="file" id="image" class="w-full rounded-xl p-2 border border-gray-300/80 focus" />
  </div>

  <button
    type="submit"
    class="bg-black hover:bg-black/80 cursor-pointer transition-colors duration-300 text-white px-4 py-2 text-lg rounded-xl font-bold text-shadow-2xs focus-button"
  >
    Crea post
  </button>
</form>
