<div class="flex flex-col px-3 sm:px-5 py-2 gap-y-3">
  <h2 class="text-base sm:text-lg font-medium max-w-xs sm:max-w-md mt-2">
    Sei sicuro di voler eliminare questo post "{{ postTitle() }}"?
  </h2>
  <p class="text-sm sm:text-base">
    Questa è una operazione irreversibile. Dopo la conferma non sarà possibile effettuare il
    ripristino.
  </p>
  <div class="flex items-center justify-end gap-4 mt-4">
    <button
      type="button"
      (click)="closeModal()"
      class="bg-gray-100 hover:bg-gray-200 text-black/70 cursor-pointer duration-300 px-4 py-2 text-base sm:text-lg rounded-md font-bold focus-button transition-colors"
    >
      Annulla
    </button>
    <button
      type="button"
      class="bg-red-500 hover:bg-red-600 cursor-pointer transition-colors duration-300 text-white px-4 py-2 text-base sm:text-lg rounded-md font-bold text-shadow-xs focus-button"
    >
      Conferma
    </button>
  </div>
</div>
