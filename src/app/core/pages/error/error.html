<div class="grid place-items-center h-svh text-center px-4">
  <div>
    <h1 class="text-xl font-bold mb-2">Qualcosa è andato storto</h1>
    <p class="text-base font-medium max-w-xl mb-6">
      Non siamo riusciti a caricare i dati. Controlla la connessione e riprova.
    </p>
    <div class="flex flex-wrap gap-3 justify-center">
      @if (onRetry()) {
        <button
          type="button"
          (click)="onRetry()!()"
          class="bg-black hover:bg-black/80 cursor-pointer text-white px-4 py-2 text-lg rounded-md font-bold text-shadow-2xs focus-button inline-block active:scale-95 transition-all duration-300"
        >
          Riprova
        </button>
      }
      <a
        routerLink="/"
        class="bg-black/5 hover:bg-black/10 cursor-pointer text-black px-4 py-2 text-lg rounded-md font-bold focus-button inline-block active:scale-95 transition-all duration-300"
      >
        Torna alla home
      </a>
    </div>
  </div>
</div>
