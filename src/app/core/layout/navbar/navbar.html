<aside
  class="fixed z-50 w-full md:top-0 left-0 bottom-0 md:w-30 flex flex-col items-center md:h-svh"
>
  <!-- Logo -->
  <div class="hidden w-full md:block text-center py-4">
    <h1 class="text-3xl font-bold tracking-normal">ngFeed</h1>
  </div>

  <!-- Navvigazione principale -->
  <div class="flex flex-col items-center w-full flex-1 min-h-0 overflow-y-auto bg-white">
    <ul
      class="flex md:flex-col items-center justify-around md:justify-center gap-2 md:gap-1 w-full flex-1"
    >
      <li
        appNavbarItem
        link="/per-te"
        [isActive]="isHomeActive()"
        ariaLabel="Home"
        [icon]="HomeIcon"
      ></li>

      <li appNavbarItem link="/cerca" ariaLabel="Cerca" [icon]="SearchIcon"></li>

      <li class="py-1 flex-1 md:flex-none">
        <button
          (click)="openCreatePostDialog()"
          class="text-zinc-400/80 bg-gray-100/55 w-full hover:text-black rounded-xl md:px-5 md:py-3 py-3 cursor-pointer flex items-center justify-center focus transition-transform active:scale-[0.92] relative z-10 group"
          aria-label="Apri crea nuovo post form"
        >
          <lucide-icon [img]="PlusIcon" size="28" aria-hidden></lucide-icon>
        </button>
      </li>

      <li
        appNavbarItem
        [link]="isAuthenticated() ? '/preferiti' : 'auth'"
        ariaLabel="Preferiti"
        [icon]="HeartIcon"
      ></li>

      <li
        appNavbarItem
        [link]="isAuthenticated() ? 'utente/' + currentUser()?.id : 'auth'"
        ariaLabel="Profilo"
        [icon]="UserIcon"
      ></li>
    </ul>
  </div>

  <!-- Menu button -->
  <div class="md:block hidden w-full mb-4 text-center">
    <div
      appClickOutsideDropdown
      [clickOutsideEnabled]="isOpen()"
      (onClickOutside)="closeMenu()"
      class="relative inline-block"
    >
      <button
        class="text-zinc-400/80 rounded-xl px-5 py-3 cursor-pointer focus transition-transform active:scale-[0.92] relative z-10 group"
        (click)="toggleOpen()"
        aria-label="Menu"
        [class.active]="isOpen()"
      >
        <div
          class="bg-gray-100/55 w-full h-full rounded-xl scale-[0.85] absolute md:px-4 md:py-2 px-6 py-3 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 -z-10 pointer-events-none group-hover:scale-100 duration-150 opacity-0 group-hover:opacity-100 ease-out transition-transform"
        ></div>
        <lucide-icon [img]="EqualIcon" size="30" aria-hidden></lucide-icon>
      </button>

      <!-- Dropdown menu -->
      <app-dropdown-menu [isOpen]="isOpen()" usedIn="navbar">
        <div class="flex items-center justify-center gap-2">
          <button
            class="w-full px-4 py-2 flex items-center justify-center hover:bg-gray-100/55 rounded-md cursor-pointer focus"
            aria-label="Modalità chiara"
            [attr.tabindex]="isOpen() ? '0' : '-1'"
          >
            <lucide-icon [img]="SunIcon" size="20" aria-hidden></lucide-icon>
          </button>
          <button
            class="w-full px-4 py-2 flex items-center justify-center hover:bg-gray-100/55 rounded-md cursor-pointer focus"
            aria-label="Modalità scura"
            [attr.tabindex]="isOpen() ? '0' : '-1'"
          >
            <lucide-icon [img]="MoonIcon" size="20" aria-hidden></lucide-icon>
          </button>
          <button
            class="w-full px-4 py-2 flex items-center justify-center bg-gray-100/55 hover:bg-gray-100/55 rounded-md cursor-pointer focus"
            [attr.tabindex]="isOpen() ? '0' : '-1'"
          >
            Auto
          </button>
        </div>

        <button
          class="w-full text-left px-4 py-2 hover:bg-gray-100/55 rounded-md cursor-pointer focus"
          [attr.tabindex]="isOpen() ? '0' : '-1'"
        >
          Impostazioni
        </button>
        @if (isAuthenticated()) {
          <button
            class="w-full text-left px-4 py-2 hover:bg-gray-100/55 rounded-md cursor-pointer focus"
            [attr.tabindex]="isOpen() ? '0' : '-1'"
          >
            Segnala un problema
          </button>

          <button
            class="text-red-500 w-full text-left px-4 py-2 hover:bg-gray-100/55 rounded-md cursor-pointer focus"
            [attr.tabindex]="isOpen() ? '0' : '-1'"
          >
            Esci
          </button>
        }
      </app-dropdown-menu>
    </div>
  </div>
</aside>
