<header
  class="flex fixed top-0 left-0 h-16 z-2000 items-center bg-white dark:bg-zinc-950 justify-between w-full md:hidden px-2"
>
  @if (isFullPostPage()) {
    <div class="relative inline-block">
      <button
        type="button"
        class="text-zinc-400/80 rounded-xl active:scale-[0.92] transition-transform motion-reduce:transition-none px-5 py-3 cursor-pointer focus relative z-10 group starting:opacity-0 starting:-translate-x-full ease-out"
        (click)="goBack()"
        aria-label="Torna indietro"
      >
        <div
          class="navlink-hover-bg bg-gray-100/55 dark:bg-zinc-800/70 w-full h-full rounded-xl scale-[0.85] absolute px-6 py-3 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 -z-10 pointer-events-none group-hover:scale-100 duration-150 opacity-0 group-hover:opacity-100 ease-out transition-transform motion-reduce:transition-none"
        ></div>
        <lucide-icon [img]="ArrowLeftIcon" size="24" aria-hidden="true" />
      </button>
    </div>
  } @else {
    <div class="relative inline-block invisible pointer-events-none">
      <div class="px-5 py-3 relative z-10 group">
        <div
          class="w-full h-full absolute px-6 py-3 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 -z-10 pointer-events-none"
        ></div>
        <lucide-icon [img]="EqualIcon" size="24" aria-hidden></lucide-icon>
      </div>
    </div>
  }

  <!-- Logo -->
  <div class="grow text-center">
    <h1 class="text-3xl font-bold tracking-normal">ngFeed</h1>
  </div>

  <!-- Menu button -->
  <div
    appClickOutside
    [clickOutsideEnabled]="isOpen()"
    (onClickOutside)="closeMenu()"
    class="relative inline-block"
  >
    <button
      #button
      class="text-zinc-400/80 rounded-xl active:scale-[0.92] transition-transform motion-reduce:transition-none px-5 py-3 cursor-pointer focus relative z-10 group"
      aria-label="Menu"
      (click)="toggleOpen()"
      [class.active]="isOpen()"
    >
      <div
        class="navlink-hover-bg bg-gray-100/55 dark:bg-zinc-800/70 w-full h-full rounded-xl scale-[0.85] absolute px-6 py-3 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 -z-10 pointer-events-none group-hover:scale-100 duration-150 opacity-0 group-hover:opacity-100 ease-out transition-transform motion-reduce:transition-none"
      ></div>
      <lucide-icon [img]="EqualIcon" size="24" aria-hidden></lucide-icon>
    </button>

    <!-- Dropdown -->
    @defer (on hover(button); on interaction(button)) {
      <app-dropdown-menu [isOpen]="isOpen()" usedIn="header">
        <div class="flex items-center justify-center gap-1">
          <button
            role="menuitem"
            class="w-full self-stretch px-4 py-2 flex items-center justify-center hover:bg-gray-100/75 dark:hover:bg-zinc-800 rounded-md cursor-pointer focus {{
              themeMode() === 'light' ? 'bg-gray-100 dark:bg-zinc-800' : ''
            }}"
            aria-label="Modalità chiara"
            [attr.tabindex]="isOpen() ? '0' : '-1'"
            (click)="setTheme('light')"
          >
            <lucide-icon [img]="SunIcon" size="20" aria-hidden></lucide-icon>
          </button>
          <button
            role="menuitem"
            class="w-full self-stretch px-4 py-2 flex items-center justify-center hover:bg-gray-100/75 dark:hover:bg-zinc-800 rounded-md cursor-pointer focus {{
              themeMode() === 'dark' ? 'bg-gray-100 dark:bg-zinc-800' : ''
            }}"
            aria-label="Modalità scura"
            [attr.tabindex]="isOpen() ? '0' : '-1'"
            (click)="setTheme('dark')"
          >
            <lucide-icon [img]="MoonIcon" size="20" aria-hidden></lucide-icon>
          </button>
          <button
            role="menuitem"
            class="w-full self-stretch px-4 py-2 flex items-center justify-center hover:bg-gray-100/75 dark:hover:bg-zinc-800 rounded-md cursor-pointer focus {{
              themeMode() === 'system' ? 'bg-gray-100 dark:bg-zinc-800' : ''
            }}"
            aria-label="Segui tema di sistema"
            [attr.tabindex]="isOpen() ? '0' : '-1'"
            (click)="setTheme('system')"
          >
            Auto
          </button>
        </div>

        <button
          role="menuitem"
          class="w-full text-left px-4 py-2 hover:bg-gray-100/75 dark:hover:bg-zinc-800 rounded-md cursor-pointer focus"
          [attr.tabindex]="isOpen() ? '0' : '-1'"
        >
          Impostazioni
        </button>

        @if (currentUser()) {
          <button
            role="menuitem"
            class="w-full text-left px-4 py-2 hover:bg-gray-100/75 dark:hover:bg-zinc-800 rounded-md cursor-pointer focus"
            [attr.tabindex]="isOpen() ? '0' : '-1'"
          >
            Segnala un problema
          </button>

          <button
            role="menuitem"
            (click)="logUserOut($event)"
            class="text-red-500 w-full text-left px-4 py-2 hover:bg-gray-100/75 dark:hover:bg-zinc-800 rounded-md cursor-pointer focus"
            [attr.tabindex]="isOpen() ? '0' : '-1'"
          >
            Esci
          </button>
        }
      </app-dropdown-menu>
    }
  </div>
</header>
