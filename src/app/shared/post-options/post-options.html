<div
  appClickOutsideDropdown
  [clickOutsideEnabled]="isOptionsOpen()"
  (onClickOutside)="this.closeOptions.emit()"
  class="relative inline-block col-span-1"
>
  <button
    class="text-zinc-400/80 rounded-full p-2 active:scale-[0.92] cursor-pointer col-span-1 focus relative z-10 group"
    [class.active]="isOptionsOpen()"
    aria-label="Opzioni post"
    (click)="toggleOptionsOpen($event)"
  >
    <div
      class="bg-gray-100/55 w-full h-full rounded-full scale-[0.85] absolute p-2.5 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 -z-10 pointer-events-none group-hover:scale-100 duration-150 opacity-0 group-hover:opacity-100 ease-out transition-transform"
    ></div>
    <lucide-icon [img]="EllipsisIcon" size="18" aria-hidden></lucide-icon>
  </button>

  <div
    class="absolute top-full {{
      isCurrentUserPost() ? 'w-46' : 'w-56'
    }} font-semibold right-0 bg-white shadow-lg rounded-lg p-1.5 border border-gray-200 space-y-2 transition-transform duration-150 ease-out origin-top-right"
    [class.opacity-100]="isOptionsOpen()"
    [class.scale-100]="isOptionsOpen()"
    [class.opacity-0]="!isOptionsOpen()"
    [class.scale-85]="!isOptionsOpen()"
    [class.-z-10]="!isOptionsOpen()"
    [class.z-30]="isOptionsOpen()"
    [inert]="!isOptionsOpen()"
    [attr.aria-hidden]="!isOptionsOpen()"
  >
    @if (!isCurrentUserPost()) {
      <button
        class="w-full flex items-center justify-between px-4 py-2 hover:bg-gray-100/55 rounded-md cursor-pointer focus"
        [attr.tabindex]="isOptionsOpen() ? '0' : '-1'"
      >
        <span>Salva</span>
        <lucide-icon [img]="BookmarkIcon" size="20" class="text-black!" aria-hidden></lucide-icon>
      </button>
      <button
        class="w-full flex items-center justify-between px-4 py-2 hover:bg-gray-100/55 rounded-md cursor-pointer focus"
        [attr.tabindex]="isOptionsOpen() ? '0' : '-1'"
      >
        <span>Non mi interessa</span>
        <lucide-icon [img]="ThumbsDownIcon" size="20" class="text-black!" aria-hidden></lucide-icon>
      </button>
      <button
        class="text-red-500 w-full flex items-center justify-between px-4 py-2 hover:bg-gray-100/55 rounded-md cursor-pointer focus"
        [attr.tabindex]="isOptionsOpen() ? '0' : '-1'"
      >
        <span>Segnala</span>
        <lucide-icon
          [img]="MessageSquareWarningIcon"
          size="20"
          class="text-red-500!"
          aria-hidden
        ></lucide-icon>
      </button>
    } @else {
      <button
        (click)="openPost($event)"
        class="w-full flex items-center justify-between px-4 py-2 hover:bg-gray-100/55 rounded-md cursor-pointer focus"
        [attr.tabindex]="isOptionsOpen() ? '0' : '-1'"
      >
        <span>Modifica</span>
        <lucide-icon [img]="PencilIcon" size="20" class="text-black!" aria-hidden></lucide-icon>
      </button>
      <button
        class="w-full flex items-center justify-between text-red-500 px-4 py-2 hover:bg-gray-100/55 rounded-md cursor-pointer focus"
        [attr.tabindex]="isOptionsOpen() ? '0' : '-1'"
      >
        <span>Elimina</span>
        <lucide-icon [img]="TrashIcon" size="20" class="text-red-500!" aria-hidden></lucide-icon>
      </button>
    }
  </div>
</div>
