<button
  (click)="showToast()"
  class="bg-black text-white px-4 py-2 rounded-md fixed bottom-20 right-4 z-5000"
>
  Show Toast
</button>
@if (isRendered()) {
  <div
    class="fixed left-2 right-2 md:left-auto md:right-4 bottom-15 md:bottom-4 md:w-80 z-5000 border border-gray-400/70 rounded-lg p-4 bg-white origin-bottom transition-all duration-250 ease-out"
    [class.opacity-100]="isVisible()"
    [class.opacity-0]="!isVisible()"
    [class.pointer-events-none]="!isVisible()"
    [class.translate-y-0]="isVisible()"
    [class.translate-y-full]="!isVisible()"
    [class.scale-100]="isVisible()"
    [class.scale-95]="!isVisible()"
    (transitionend)="onTransitionEnd()"
    [inert]="!isVisible()"
  >
    <button
      aria-label="Chiudi notifica"
      class="absolute top-1.5 right-1.5 rounded-full p-0.5 hover:bg-black/5 active:scale-[0.88] cursor-pointer transition-transform focus disabled:cursor-not-allowed disabled:hover:bg-white disabled:active:scale-100"
    >
      <lucide-icon [img]="XIcon" size="18" class="text-black/50!" aria-hidden></lucide-icon>
    </button>
    <p class="text-sm text-black/70">toast-container works!</p>
  </div>
}
