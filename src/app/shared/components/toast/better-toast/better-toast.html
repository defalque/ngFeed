<section aria-label="Notifiche" aria-live="polite" aria-atomic="false">
  <ol
    class="fixed left-2 right-2 sm:left-auto sm:right-4 bottom-16 md:bottom-4 w-auto sm:w-89 z-5000 flex flex-col motion-reduce:transition-none"
    tabindex="-1"
  >
    @for (toast of toasts(); track toast.id) {
      <app-better-toast-item
        [toast]="toast"
        [icon]="getIcon(toast.type)"
        [offset]="offsets()[toast.id]"
        (heightChange)="onHeightChange(toast.id, $event)"
      ></app-better-toast-item>
    }
  </ol>
</section>

  <ol

    (mouseenter)="expanded.set(true)"
    (mousemove)="expanded.set(true)"

    @for (toast of toasts(); track toast.id) {
