@if (isRendered()) {
  <div
    class="fixed inset-0 bg-black/20 dark:bg-black/60 z-2000 flex sm:items-center justify-center transition-opacity duration-150 origin-bottom ease-out"
    [class]="{
      'items-end': !isAlert(),
    }"
    [class.opacity-100]="isVisible()"
    [class.opacity-0]="!isVisible()"
    [class.pointer-events-none]="!isVisible()"
    (transitionend)="onTransitionEnd()"
    [inert]="!isVisible()"
  >
    <div
      [attr.role]="isAlert() ? 'alertdialog' : 'dialog'"
      aria-modal="true"
      [aria-label]="title()"
      [cdkTrapFocus]="isVisible()"
      [cdkTrapFocusAutoCapture]="isVisible()"
      appClickOutsideDropdown
      [clickOutsideEnabled]="isVisible()"
      (onClickOutside)="toggleFn.emit()"
      class="sm:w-xl max-h-[90vh] flex flex-col rounded-t-2xl border-gray-400/70 dark:border-zinc-600/50 sm:border bg-white dark:bg-zinc-900 transition-transform ease-out origin-bottom sm:rounded-2xl sm:animate-none sm:duration-150 select-none"
      [class]="{
        'border-t': !isAlert(),
        border: isAlert(),
        'sm:translate-y-0': !isVisible() && !isAlert(),
        'w-86': isAlert(),
        'w-full': !isAlert(),
        'duration-150': isAlert(),
        'duration-300': !isAlert(),
      }"
      [class.translate-y-full]="!isVisible() && !isAlert()"
      [class.translate-y-0]="isVisible() && !isAlert()"
      [class.pointer-events-none]="!isVisible()"
      [class.rounded-2xl]="isAlert()"
      [class.self-center]="isAlert()"
      [class.md:opacity-100]="isVisible()"
      [class.md:scale-100]="isVisible()"
      [class.md:opacity-0]="!isVisible()"
      [class.md:scale-85]="!isVisible()"
      [class.opacity-100]="isVisible() && isAlert()"
      [class.scale-100]="isVisible() && isAlert()"
      [class.opacity-0]="!isVisible() && isAlert()"
      [class.scale-85]="!isVisible() && isAlert()"
      [class.pointer-events-none]="!isVisible()"
      [inert]="!isVisible()"
      #swiperElement
      (pointerdown)="onPointerDown($event)"
      (pointermove)="onPointerMove($event)"
      (pointerup)="onPointerUp()"
      (pointercancel)="onPointerUp()"
    >
      @if (isMobileSheet() && !isAlert()) {
        <div
          class="rounded-full bg-gray-300 dark:bg-zinc-600 w-12 h-1.5 mx-auto mt-2 pointer-events-none md:hidden"
          aria-hidden="true"
        ></div>
      }

      <div class="bg-white dark:bg-zinc-900 sticky top-0 p-4 rounded-t-2xl flex-none">
        <button
          aria-label="Chiudi modale"
          cdkFocusRegionStart
          cdkFocusInitial
          (click)="onClose()"
          class="absolute top-1/2 -translate-y-1/2 right-2.5 p-2 rounded-full hover:bg-gray-100/55 dark:hover:bg-zinc-800 active:scale-[0.88] cursor-pointer transition-transform focus disabled:cursor-not-allowed disabled:hover:bg-white dark:disabled:hover:bg-zinc-900 disabled:active:scale-100"
          [disabled]="isBusy()"
        >
          <lucide-icon [img]="XIcon" size="18" aria-hidden></lucide-icon>
        </button>

        <h2 class="font-semibold text-center">{{ title() }}</h2>
      </div>

      <div class="overflow-y-auto flex-1">
        <ng-content></ng-content>
      </div>
    </div>
  </div>
}
