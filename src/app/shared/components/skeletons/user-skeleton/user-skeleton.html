<div class="flex flex-col items-center gap-4 px-2 py-4 sm:p-4 animate-pulse">
  <!-- Avatar + social -->
  <div class="flex w-full _items-start gap-4">
    <div class="flex flex-col items-center gap-2 flex-none">
      <!-- Skeleton avatar -->

      <div class="size-24 sm:size-28 md:size-24 rounded-full bg-gray-200 dark:bg-zinc-800"></div>

      <!-- Skeleton social icons -->
      <div class="flex items-center gap-4">
        <div class="w-7 h-7 md:w-5 md:h-5 rounded-xl bg-gray-200 dark:bg-zinc-800"></div>
        <div class="w-7 h-7 md:w-5 md:h-5 rounded-md bg-gray-200 dark:bg-zinc-800"></div>
      </div>
    </div>

    <!-- Info utente skeleton -->
    <div class="flex flex-col md:flex-row gap-4 w-full">
      <div class="flex flex-col flex-1 gap-1">
        <!-- Nome -->
        <div class="w-36 sm:w-48 h-7 bg-gray-200 dark:bg-zinc-800 rounded-full mb-1"></div>

        <!-- Username -->
        <div class="w-26 sm:w-32 h-5 md:h-4 bg-gray-200 dark:bg-zinc-800 rounded-full"></div>

        <!-- Bio -->
        <div class="w-full h-4 bg-gray-200 dark:bg-zinc-800 rounded-full mt-2"></div>
        <div class="w-1/3 h-4 bg-gray-200 dark:bg-zinc-800 rounded-full"></div>

        <!-- Followers + website -->
        <div class="flex gap-4 items-center mt-4">
          <!-- <div class="w-1/3 sm:w-24 h-5 bg-gray-200 rounded-full"></div> -->
          <div class="w-1/3 sm:w-32 h-5 bg-gray-200 dark:bg-zinc-800 rounded-full"></div>
        </div>
      </div>

      <div
        class="bg-gray-200 dark:bg-zinc-800 w-full md:w-20 h-9.5 rounded-md md:self-end mt-0 md:mt-4"
      ></div>
    </div>
  </div>

  <!-- Tabs skeleton -->
  <div class="flex px-2 gap-6 sm:gap-16 pt-4 justify-center">
    <div class="w-32 h-7 bg-gray-200 dark:bg-zinc-800 rounded-full"></div>
    <div class="w-24 h-7 bg-gray-200 dark:bg-zinc-800 rounded-full"></div>
  </div>
</div>
