<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ngFeed</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="ngFeed è un'applicazione per la gestione di feed social" />
    <link rel="icon" type="image/x-icon" href="favicon.png" />
    <link rel="preload" href="assets/images/default-user.avif" as="image" />

    <link rel="preconnect" href="https://randomuser.me" />

    <!-- Applica il tema subito per evitare flash del tema sbagliato prima del bootstrap di Angular -->
    <script>
      (() => {
        const storageKey = 'ngfeed-theme';
        const storedTheme = localStorage.getItem(storageKey);
        const isSystemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        // Risolvi: dark esplicito, oppure (nessuna preferenza / system) e SO in dark mode
        const resolvedTheme =
          storedTheme === 'dark' || (storedTheme !== 'light' && isSystemDark) ? 'dark' : 'light';

        document.documentElement.classList.toggle('dark', resolvedTheme === 'dark');
      })();
    </script>
  </head>
  <body class="antialiased bg-white text-black dark:bg-zinc-950 dark:text-zinc-100">
    <app-root></app-root>
  </body>
</html>
